<style>
:root{
  --cream:#FFF6EC; --cream2:#FFEFDD;
  --pink:#FFC9D6; --pink-soft:#FFE3EA; --pink-deep:#F79EB4;
  --sky:#BFE0F5; --sky-soft:#E1F1FB; --sky-deep:#8FC5E8;
  --mint:#C6EBD9; --mint-soft:#E3F6EC; --mint-deep:#8FD6B4;
  --peach:#FFD9BE; --peach-soft:#FFEBDD; --peach-deep:#F7B98C;
  --ink:#6B5560; --ink-soft:#9A8490;
  --card:#FFFDF9;
  --line:2.5px solid var(--ink);
  --shadow:0 4px 0 rgba(107,85,96,.18);
  --radius:22px;
}
:root[data-theme="dark"]{
  --cream:#2E2530; --cream2:#382D3A;
  --pink:#8A5468; --pink-soft:#4A3542; --pink-deep:#C97D97;
  --sky:#4A6A85; --sky-soft:#35434F; --sky-deep:#7FB2D6;
  --mint:#4E7A66; --mint-soft:#33463D; --mint-deep:#7CC4A2;
  --peach:#8A6448; --peach-soft:#4A3B30; --peach-deep:#DBA070;
  --ink:#F0E4EA; --ink-soft:#B8A5B0;
  --card:#3A2F3C;
  --shadow:0 4px 0 rgba(0,0,0,.3);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --cream:#2E2530; --cream2:#382D3A;
    --pink:#8A5468; --pink-soft:#4A3542; --pink-deep:#C97D97;
    --sky:#4A6A85; --sky-soft:#35434F; --sky-deep:#7FB2D6;
    --mint:#4E7A66; --mint-soft:#33463D; --mint-deep:#7CC4A2;
    --peach:#8A6448; --peach-soft:#4A3B30; --peach-deep:#DBA070;
    --ink:#F0E4EA; --ink-soft:#B8A5B0;
    --card:#3A2F3C;
    --shadow:0 4px 0 rgba(0,0,0,.3);
  }
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--cream); color:var(--ink);
  font-family:"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  line-height:1.65; letter-spacing:-.01em;
  display:flex; flex-direction:column; min-height:100vh;
}
/* sprinkles background */
.sprinkles{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden}
.sprinkles span{position:absolute; display:block; border-radius:6px; opacity:.5}
header{
  position:relative; z-index:2;
  display:flex; align-items:center; gap:14px;
  padding:16px 20px; background:var(--card);
  border-bottom:var(--line);
}
.mascot{flex:0 0 auto; width:56px; height:56px}
h1{font-size:1.15rem; margin:0; font-weight:800; text-wrap:balance}
.sub{font-size:.8rem; color:var(--ink-soft); margin:2px 0 0}
.badge-row{display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; justify-content:flex-end}
.badge{
  font-size:.7rem; font-weight:700; padding:4px 10px; border-radius:999px;
  border:2px solid var(--ink); background:var(--mint); box-shadow:var(--shadow);
  white-space:nowrap;
}
.badge.b2{background:var(--pink)}
main{
  position:relative; z-index:1; flex:1;
  width:100%; max-width:760px; margin:0 auto; padding:18px 14px 130px;
  display:flex; flex-direction:column; gap:14px;
}
/* chat bubbles */
.row{display:flex; gap:10px; align-items:flex-end; animation:pop .3s ease both}
@keyframes pop{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){.row{animation:none}}
.row.user{flex-direction:row-reverse}
.avatar{flex:0 0 auto; width:40px; height:40px}
.bubble{
  max-width:82%; padding:12px 16px; border-radius:var(--radius);
  border:var(--line); box-shadow:var(--shadow); background:var(--card);
  font-size:.92rem; overflow-wrap:break-word;
}
.row.bot .bubble{border-bottom-left-radius:6px}
.row.user .bubble{background:var(--sky-soft); border-bottom-right-radius:6px}
.bubble h3{margin:.2em 0 .4em; font-size:1rem}
.bubble h4{margin:.8em 0 .3em; font-size:.92rem; display:flex; align-items:center; gap:6px}
.bubble p{margin:.35em 0}
.bubble ul{margin:.3em 0; padding-left:1.15em}
.bubble li{margin:.22em 0}
.bubble a{color:inherit; font-weight:700; text-decoration-thickness:2px; text-decoration-color:var(--pink-deep)}
.bubble .tip{
  margin-top:.6em; padding:9px 12px; border-radius:14px;
  background:var(--peach-soft); border:2px dashed var(--peach-deep); font-size:.85rem;
}
.bubble .prompt{
  margin:.4em 0; padding:10px 12px; border-radius:12px;
  background:var(--sky-soft); border:2px solid var(--sky-deep);
  font-size:.84rem; line-height:1.55; white-space:pre-wrap; word-break:break-word;
}
.bubble .prompt b{color:var(--pink-deep)}
.bubble .warn{
  margin-top:.6em; padding:9px 12px; border-radius:14px;
  background:var(--pink-soft); border:2px dashed var(--pink-deep); font-size:.85rem;
}
.bubble details{margin:.4em 0; border:2px solid var(--ink); border-radius:14px; background:var(--card); overflow:hidden}
.bubble summary{cursor:pointer; padding:8px 12px; font-weight:700; font-size:.88rem; background:var(--sky-soft); list-style-position:inside}
.bubble summary:hover{filter:brightness(1.03)}
.bubble details[open] summary{border-bottom:2px dashed var(--ink-soft)}
.bubble details .a{padding:8px 12px; font-size:.86rem}
.bubble .cat{display:inline-block; font-size:.72rem; font-weight:800; padding:1px 8px; border-radius:999px; background:var(--peach-soft); border:1.5px solid var(--peach-deep); margin-right:4px}
.bubble table{border-collapse:collapse; margin:.5em 0; font-size:.84rem; width:100%}
.bubble .tablewrap{overflow-x:auto}
.bubble th,.bubble td{border:2px solid var(--ink); padding:6px 9px; text-align:left; vertical-align:top}
.bubble th{background:var(--sky-soft)}
.bubble td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
.src{margin-top:.6em; font-size:.72rem; color:var(--ink-soft)}
/* chips */
.chips{display:flex; flex-wrap:wrap; gap:8px; padding:2px 0 4px}
.chip{
  font-family:inherit; font-size:.82rem; font-weight:700; color:var(--ink);
  background:var(--card); border:2px solid var(--ink); border-radius:999px;
  padding:7px 14px; cursor:pointer; box-shadow:var(--shadow);
  transition:transform .12s ease;
}
.chip:hover{transform:translateY(-2px)}
.chip:focus-visible{outline:3px solid var(--sky-deep); outline-offset:2px}
.chip.c-pink{background:var(--pink-soft)} .chip.c-sky{background:var(--sky-soft)}
.chip.c-mint{background:var(--mint-soft)} .chip.c-peach{background:var(--peach-soft)}
/* budget calculator */
.calc{display:grid; gap:10px; margin-top:.5em}
.calc label{font-size:.82rem; font-weight:700; display:grid; gap:4px}
.calc input{
  font-family:inherit; font-size:.95rem; padding:9px 12px;
  border:2px solid var(--ink); border-radius:14px; background:var(--card); color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.calc input:focus-visible{outline:3px solid var(--mint-deep); outline-offset:1px}
.calc .go{
  font-family:inherit; font-size:.9rem; font-weight:800; padding:10px;
  border:var(--line); border-radius:16px; background:var(--mint); color:var(--ink);
  cursor:pointer; box-shadow:var(--shadow);
}
.calc .go:hover{filter:brightness(1.04)}
.meter{height:18px; border:2px solid var(--ink); border-radius:999px; overflow:hidden; background:var(--card); margin:.3em 0}
.meter i{display:block; height:100%; background:linear-gradient(90deg,var(--mint-deep),var(--sky-deep))}
.meter i.over{background:linear-gradient(90deg,var(--peach-deep),var(--pink-deep))}
/* input bar */
form.bar{
  position:fixed; left:0; right:0; bottom:0; z-index:3;
  background:var(--card); border-top:var(--line);
  padding:12px 14px calc(12px + env(safe-area-inset-bottom));
}
.bar-inner{max-width:760px; margin:0 auto; display:flex; gap:10px}
.bar input{
  flex:1; font-family:inherit; font-size:1rem; color:var(--ink);
  padding:12px 18px; border:var(--line); border-radius:999px; background:var(--cream);
}
.bar input:focus-visible{outline:3px solid var(--pink-deep); outline-offset:2px}
.bar button{
  flex:0 0 auto; width:52px; height:52px; border:var(--line); border-radius:50%;
  background:var(--pink); cursor:pointer; box-shadow:var(--shadow);
  display:grid; place-items:center; transition:transform .12s ease;
}
.bar button:hover{transform:scale(1.06)}
.bar button:focus-visible{outline:3px solid var(--sky-deep); outline-offset:2px}
.credit{
  max-width:760px; margin:8px auto 0; text-align:center;
  font-size:.7rem; color:var(--ink-soft);
}
.credit a{color:inherit; font-weight:700; text-decoration-color:var(--pink-deep)}
.typing{display:inline-flex; gap:5px; padding:4px 2px}
.typing i{width:8px; height:8px; border-radius:50%; background:var(--ink-soft); animation:bnc 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}
@media (prefers-reduced-motion:reduce){.typing i{animation:none}}
</style>

  for(const rule of RULES){
    for(const it of rule.items){
      if(nq.includes(normalize(it))) return {rule, item: it.trim()};

function calcFormHTML(){
  return `<div class="calc" data-calc>
    <label>총 교부액 (천원) <input type="number" data-total value="${TOTAL_DEFAULT}" min="0"></label>
    <label>지금까지 집행액 (천원) <input type="number" data-spent value="0" min="0"></label>
    <label>환경지원비 편성액 (천원) <input type="number" data-env value="3000" min="0"></label>
    <label>업무추진비 편성액 (천원) <input type="number" data-biz value="3000" min="0"></label>
    <button type="button" class="go" data-calc-go>계산하기 ✨</button>
    <div data-calc-out></div>
  </div>`;
}

function runCalc(box){
  const total = +box.querySelector('[data-total]').value || 0;
  const spent = +box.querySelector('[data-spent]').value || 0;
  const env = +box.querySelector('[data-env]').value || 0;
  const biz = +box.querySelector('[data-biz]').value || 0;
  const remain = total - spent;
  const pct = total>0 ? Math.min(100, Math.round(spent/total*100)) : 0;
  const cap = Math.min(3000, Math.round(total*0.085/100)*100); // 8.5% 반올림(백 단위)
  let out = `<p><b>집행률 ${pct}%</b> · 잔액 <b>${fmt(remain)}천원</b> (${fmt(remain*1000)}원)</p>
  <div class="meter"><i style="width:${pct}%" class="${spent>total?'over':''}"></i></div><ul>`;
  out += env>cap ? `<li>⚠️ 환경지원비 ${fmt(env)}천원 — 한도(${fmt(cap)}천원, 총액의 8.5%·최대 3,000천원)를 <b>초과</b>했어요! 조정 필요.</li>`
                 : `<li>✅ 환경지원비 ${fmt(env)}천원 — 한도(${fmt(cap)}천원) 이내예요.</li>`;
  out += biz>cap ? `<li>⚠️ 업무추진비 ${fmt(biz)}천원 — 한도(${fmt(cap)}천원)를 <b>초과</b>했어요! 조정 필요.</li>`
                 : `<li>✅ 업무추진비 ${fmt(biz)}천원 — 한도(${fmt(cap)}천원) 이내예요.</li>`;
  if(spent>total) out += `<li>⚠️ 집행액이 교부액을 넘었어요! 학교회계 담당자와 확인하세요.</li>`;
  out += `</ul>`;
  if(remain>0) out += `<p>남은 ${fmt(remain)}천원 활용 아이디어가 필요하면 <b>"예산이 ${fmt(remain)}천원 남았어요"</b>라고 물어보세요!</p>`;
  box.querySelector('[data-calc-out]').innerHTML = out;
}

/* ---------- 금액 파싱 ---------- */
function parseRemainQuestion(q){
  if(!/(남|잔액|잔여)/.test(q)) return null;
  const m = q.replace(/,/g,'').match(/(\d+(?:\.\d+)?)\s*(억|천만\s*원|천만원|백만\s*원|백만원|만\s*원|만원|천원|원)?/);
  if(!m) return null;
  let n = parseFloat(m[1]); const unit = (m[2]||'').replace(/\s/g,'');
  let cheon; // 천원 단위
  if(unit==='억') cheon = n*100000;
  else if(unit==='천만원') cheon = n*10000;
  else if(unit==='백만원') cheon = n*1000;
  else if(unit==='만원') cheon = n*10;
  else if(unit==='천원') cheon = n;
  else if(unit==='원') cheon = n/1000;
  else cheon = n<=35000 ? n : n/1000; // 단위 없으면 천원으로 추정
  return Math.round(cheon);
}

/* ---------- 매칭 엔진 ---------- */
function normalize(s){ return s.toLowerCase().replace(/\s+/g,''); }
function answer(q){
  const remain = parseRemainQuestion(q);
  if(remain!==null && remain>0) return budgetAdvice(remain);
  if(/계산기|얼마 남|집행률/.test(q)) return `<h3>🧮 예산 계산기</h3><p>숫자를 넣고 계산하기를 눌러보세요!</p>${calcFormHTML()}`;
  const nq = normalize(q);
  // 1) 구매·지출 판정 엔진: 구체 품목이 보이면 콕 집어 판정 ("어디서 사?"류는 구매처 안내로)
  if(!WHERE_RE.test(q)){
    const hit = findRule(nq);
    if(hit) return hit.rule.html(hit.item)
      + `<h4 style="margin-top:1em">🔎 더 알아보기</h4>${chipsForIds(hit.rule.rel)}`;
  }
  // 1-b) "AI/프롬프트로 보고서·슬라이드 작성" 신호가 있으면 AI 작성 카드로 우선 연결
  if(/프롬프트|생성형|챗봇|클로드|claude|chatgpt|gpt|제미나이|gemini|\bai\b|ai로|에이아이/i.test(nq)
     && /보고서|슬라이드|발표|대본|개조식|자료/.test(nq)){
    const w = KB.find(k=>k.id==='aiwrite');
    if(w) return w.html + `<h4 style="margin-top:1em">🔎 이것도 궁금하시다면</h4>${topicChipsHTML(w.id, 3)}`;
  }
  // 2) 주제 카드 매칭
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const kw of item.keywords){ if(nq.includes(normalize(kw))) score += kw.length>=3?2:1; }
    if(score>bestScore){ bestScore=score; best=item; }
  }
  // 3) 구매 의도인데 딱 맞는 근거가 없으면 → 공식 판단 기준으로 안내
  if((!best || bestScore<2) && BUY_INTENT_RE.test(nq)) return unknownBuyHTML();
  if(!best) return guideHTML();
  return best.html + `<h4 style="margin-top:1em">🔎 이것도 궁금하시다면</h4>${topicChipsHTML(best.id, 3)}`;
}

/* ---------- AI 해석 (Claude) ----------
   Cloudflare Worker 프록시 주소를 넣으면 켜져요. 설치법: ai-proxy/README.md */
let AI_ENDPOINT = 'https://seondo-ai.nameless-dream-46ef.workers.dev';
const AI_HISTORY = [];
function aiOn(){ return AI_ENDPOINT.length > 0; }

function mdToHtml(t){
  const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const bold = esc.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  let html='', inList=false;
  for(const ln of bold.split(/\r?\n/)){
    if(/^\s*[-•*]\s+/.test(ln)){
      if(!inList){ html+='<ul>'; inList=true; }
      html += '<li>'+ln.replace(/^\s*[-•*]\s+/,'')+'</li>';
    } else {
      if(inList){ html+='</ul>'; inList=false; }
      if(ln.trim()) html += '<p>'+ln+'</p>';
    }
  }
  if(inList) html+='</ul>';
  return html;
}

async function askAI(q, row){
  const bubble = row.querySelector('.bubble');
  try{
    const res = await fetch(AI_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question:q, history: AI_HISTORY.slice(-6)})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok || !data.answer) throw new Error(data.error || '응답을 받지 못했어요');
    AI_HISTORY.push({role:'user',content:q},{role:'assistant',content:data.answer});
    if(AI_HISTORY.length>12) AI_HISTORY.splice(0, AI_HISTORY.length-12);
    bubble.innerHTML = `<p class="src" style="margin:0 0 .5em">🤖 AI 해석 답변</p>`
      + mdToHtml(data.answer)
      + `<div class="tip">💡 AI가 지침을 해석한 답변이에요. 중요한 지출은 집행 전에 담당 장학사와 확인하세요!</div>`;
  }catch(err){
    bubble.innerHTML = `<p>😢 AI 연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요.</p>`
      + `<p class="src">${String(err && err.message || err).replace(/</g,'&lt;')}</p>`;
  }
  row.scrollIntoView({behavior:'smooth', block:'end'});
}

function aiRetryChipHTML(q){
  if(!aiOn()) return '';
  return `<div class="chips" style="margin-top:.6em"><button type="button" class="chip c-sky" data-ai-q="${encodeURIComponent(q)}">🤖 AI에게 다시 묻기</button></div>`;
}

function ask(q){
  addRow('user', q.replace(/</g,'&lt;'));
  const t = addRow('bot','<span class="typing"><i></i><i></i><i></i></span>');
  const local = answer(q);
  // 키워드로 못 알아들은 질문(안내/근거없음 카드)은 AI가 켜져 있으면 AI에게 넘겨요
  if(aiOn() && local.startsWith('<!--fb-->')){
    askAI(q, t);
    return;
  }
  setTimeout(()=>{
    t.querySelector('.bubble').innerHTML = local + aiRetryChipHTML(q);
    t.scrollIntoView({behavior:'smooth', block:'end'});
  }, 450);
}

form.addEventListener('submit', e=>{
  e.preventDefault();
  const q = input.value.trim();
  if(!q) return;
  input.value='';
  ask(q);
});

chat.addEventListener('click', e=>{
  const go = e.target.closest('[data-calc-go]');
  if(go){ runCalc(go.closest('[data-calc]')); return; }
  const ai = e.target.closest('[data-ai-q]');
  if(ai){
    const q = decodeURIComponent(ai.dataset.aiQ);
    ai.disabled = true; ai.textContent = '🤖 AI가 생각 중...';
    const t = addRow('bot','<span class="typing"><i></i><i></i><i></i></span>');
    askAI(q, t).finally(()=>{ ai.disabled = false; ai.textContent = '🤖 AI에게 다시 묻기'; });
    return;
  }
  const kb = e.target.closest('[data-kb]');
  if(kb){
    const item = KB.find(k=>k.id===kb.dataset.kb);
    if(item){
      addRow('user', item.title.replace(/^[^ ]+ /,''));
      const t = addRow('bot','<span class="typing"><i></i><i></i><i></i></span>');
      setTimeout(()=>{
        t.querySelector('.bubble').innerHTML = item.html + `<h4 style="margin-top:1em">🔎 이것도 궁금하시다면</h4>${topicChipsHTML(item.id, 3)}`;
        t.scrollIntoView({behavior:'smooth', block:'end'});
      }, 350);
    }
  }
});
